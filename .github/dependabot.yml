version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 2
    groups:
      python-runtime:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "prometheus-client"
          - "pydantic-settings"
          - "opentelemetry-*"
      python-dev-tools:
        patterns:
          - "pytest*"
          - "httpx"
          - "ruff"
          - "mypy"
          - "pre-commit"
          - "types-*"
