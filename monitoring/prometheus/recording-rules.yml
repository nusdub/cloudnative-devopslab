groups:
  - name: cloudnative-devopslab.recording
    interval: 30s
    rules:
      - record: job:http_requests:rate5m
        expr: sum by (job) (rate(http_requests_total[5m]))

      - record: job:http_requests_errors:rate5m
        expr: sum by (job) (rate(http_requests_total{status=~"5.."}[5m]))

      - record: job:http_request_error_ratio:rate5m
        expr: |
          sum by (job) (rate(http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum by (job) (rate(http_requests_total[5m])), 0.001)

      - record: job:http_request_error_ratio:rate30m
        expr: |
          sum by (job) (rate(http_requests_total{status=~"5.."}[30m]))
          /
          clamp_min(sum by (job) (rate(http_requests_total[30m])), 0.001)

      - record: job:http_request_error_ratio:rate1h
        expr: |
          sum by (job) (rate(http_requests_total{status=~"5.."}[1h]))
          /
          clamp_min(sum by (job) (rate(http_requests_total[1h])), 0.001)

      - record: job:http_request_error_ratio:rate6h
        expr: |
          sum by (job) (rate(http_requests_total{status=~"5.."}[6h]))
          /
          clamp_min(sum by (job) (rate(http_requests_total[6h])), 0.001)

      - record: job:http_request_duration_seconds:p95:rate5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, le) (rate(http_request_duration_seconds_bucket[5m]))
          )

      - record: job:http_request_duration_seconds:p99:rate5m
        expr: |
          histogram_quantile(
            0.99,
            sum by (job, le) (rate(http_request_duration_seconds_bucket[5m]))
          )

      - record: job:slo_availability:ratio5m
        expr: 1 - job:http_request_error_ratio:rate5m

      - record: job:slo_error_budget_burn:rate5m
        expr: job:http_request_error_ratio:rate5m / 0.001

      - record: job:app_build_info:count
        expr: count by (job, git_sha, image_digest) (app_build_info)
