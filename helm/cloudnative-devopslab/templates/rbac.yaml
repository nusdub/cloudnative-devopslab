apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cloudnative-devopslab.fullname" . }}
  labels:
    {{- include "cloudnative-devopslab.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cloudnative-devopslab.fullname" . }}-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cloudnative-devopslab.fullname" . }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "cloudnative-devopslab.fullname" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cloudnative-devopslab.fullname" . }}-reader
