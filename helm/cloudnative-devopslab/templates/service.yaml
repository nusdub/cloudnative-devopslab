apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudnative-devopslab.fullname" . }}
  labels:
    {{- include "cloudnative-devopslab.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "cloudnative-devopslab.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
