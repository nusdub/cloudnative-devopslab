apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-devopslab
  namespace: argocd
  labels:
    app.kubernetes.io/name: cloudnative-devopslab
spec:
  project: default
  source:
    repoURL: https://github.com/example/cloudnative-devopslab.git
    targetRevision: main
    path: helm/cloudnative-devopslab
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: devopslab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
