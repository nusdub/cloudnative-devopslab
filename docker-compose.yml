services:
  app:
    build: .
    image: cloudnative-devopslab:local
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_VERSION: compose
      FAULT_MODE: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 3
