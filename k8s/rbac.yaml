apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudnative-devopslab
  namespace: devopslab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudnative-devopslab-reader
  namespace: devopslab
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudnative-devopslab-reader
  namespace: devopslab
subjects:
  - kind: ServiceAccount
    name: cloudnative-devopslab
    namespace: devopslab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloudnative-devopslab-reader
